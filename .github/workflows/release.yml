name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag like v0.1.0
        required: true
      release_name:
        description: Optional release title
        required: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.1.0"

      - name: Create signing keystore
        run: |
          keytool -genkeypair \
            -keystore "$RUNNER_TEMP/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PATH: ${{ runner.temp }}/debug.keystore
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: androiddebugkey
          KEY_PASSWORD: android
        run: |
          chmod +x ./build-release.sh
          ./build-release.sh

      - name: Resolve release metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_NAME: ${{ github.event.inputs.release_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
            name="$INPUT_NAME"
          else
            tag="$REF_NAME"
            name=""
          fi
          if [ -z "$name" ]; then
            name="HD WebView Spoof $tag"
          fi
          {
            echo "tag=$tag"
            echo "name=$name"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          files: hd-webview-spoof/HDWebViewSpoof.apk
